name: Build Stable APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create Flutter App
      run: |
        flutter create detox_app
        cd detox_app

        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';

        void main() => runApp(const DetoxApp());

        class DetoxApp extends StatelessWidget {
          const DetoxApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Détox Premium',
              theme: ThemeData(
                scaffoldBackgroundColor: Colors.white,
                cardTheme: CardTheme(
                  elevation: 0,
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20)),
                ),
                appBarTheme: const AppBarTheme(
                  backgroundColor: Colors.white,
                  foregroundColor: Colors.black,
                  elevation: 0,
                  centerTitle: false,
                ),
                useMaterial3: true,
              ),
              debugShowCheckedModeBanner: false,
              home: const HomePage(),
            );
          }
        }

        class HomePage extends StatelessWidget {
          const HomePage({super.key});

          final List<Map<String, dynamic>> items = const [
            {'title': 'Méditation', 'sub': '5 min', 'color': 0xFFF5E6D3},
            {'title': 'Défi sans écran', 'sub': '2h offline', 'color': 0xFFE8F0FE},
            {'title': 'Journaling', 'sub': 'Exprimer', 'color': 0xFFE6F7F0},
            {'title': 'Marche', 'sub': 'Reconnexion', 'color': 0xFFFEF3E8},
            {'title': 'Respiration', 'sub': 'Anti-stress', 'color': 0xFFEDE7F6},
            {'title': 'Lecture', 'sub': 'Papier', 'color': 0xFFFFF5E0},
            {'title': 'Créativité', 'sub': 'Dessin', 'color': 0xFFE3F2FD},
            {'title': 'Sport', 'sub': '15 min', 'color': 0xFFFCE4EC},
            {'title': 'Cuisine', 'sub': 'Sans distraction', 'color': 0xFFF1F8E9},
            {'title': 'Sommeil', 'sub': 'Rituel', 'color': 0xFFF3E5F5},
          ];

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('Détox\nPremium', style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold)),
                actions: [
                  IconButton(onPressed: () {}, icon: const Icon(Icons.search)),
                  const CircleAvatar(child: Icon(Icons.person)),
                ],
              ),
              body: CustomScrollView(
                slivers: [
                  const SliverToBoxAdapter(
                    child: Padding(
                      padding: EdgeInsets.all(16),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('Inspiration bien-être', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                          SizedBox(height: 5),
                          Text('Réduisez votre temps d\'écran', style: TextStyle(fontSize: 15, color: Colors.grey)),
                        ],
                      ),
                    ),
                  ),
                  SliverPadding(
                    padding: const EdgeInsets.all(12),
                    sliver: SliverGrid(
                      gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                        crossAxisCount: 2,
                        crossAxisSpacing: 12,
                        mainAxisSpacing: 12,
                        childAspectRatio: 0.75,
                      ),
                      delegate: SliverChildBuilderDelegate(
                        (context, index) => _PremiumCard(item: items[index % items.length]),
                        childCount: 20,
                      ),
                    ),
                  ),
                ],
              ),
            );
          }
        }

        class _PremiumCard extends StatefulWidget {
          final Map<String, dynamic> item;
          const _PremiumCard({required this.item});

          @override
          State<_PremiumCard> createState() => _PremiumCardState();
        }

        class _PremiumCardState extends State<_PremiumCard> with SingleTickerProviderStateMixin {
          late AnimationController _controller;
          late Animation<double> _scale;

          @override
          void initState() {
            super.initState();
            _controller = AnimationController(vsync: this, duration: const Duration(milliseconds: 100));
            _scale = Tween<double>(begin: 1.0, end: 0.97).animate(_controller);
          }

          void _onTapDown(_) => _controller.forward();
          void _onTapUp(_) => _controller.reverse();
          void _onTapCancel() => _controller.reverse();

          @override
          void dispose() {
            _controller.dispose();
            super.dispose();
          }

          @override
          Widget build(BuildContext context) {
            return GestureDetector(
              onTapDown: _onTapDown,
              onTapUp: _onTapUp,
              onTapCancel: _onTapCancel,
              onTap: () {},
              child: AnimatedBuilder(
                animation: _scale,
                builder: (context, child) => Transform.scale(
                  scale: _scale.value,
                  child: Container(
                    decoration: BoxDecoration(
                      color: Color(widget.item['color']),
                      borderRadius: BorderRadius.circular(24),
                    ),
                    padding: const EdgeInsets.all(16),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      mainAxisAlignment: MainAxisAlignment.end,
                      children: [
                        const Spacer(),
                        Text(widget.item['title'], style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold, color: Colors.black87)),
                        const SizedBox(height: 5),
                        Text(widget.item['sub'], style: const TextStyle(fontSize: 14, color: Colors.black54)),
                        const SizedBox(height: 12),
                        Row(
                          children: const [
                            Icon(Icons.favorite_border, size: 18),
                            SizedBox(width: 12),
                            Icon(Icons.bookmark_border, size: 18),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              ),
            );
          }
        }
        DARTEOF

        cat > pubspec.yaml << 'PUBEOF'
        name: detox_app
        description: App de détox numérique
        version: 1.0.0+1

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter

        flutter:
          uses-material-design: true
        PUBEOF

        flutter clean
        flutter pub get
        flutter build apk --release
        cp build/app/outputs/flutter-apk/app-release.apk ../detox-final.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: detox-premium-stable
        path: detox-final.apk
