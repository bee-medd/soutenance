name: Build Professional Premium App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create Pharma E-Commerce Pro
      run: |
        flutter create pharma_pro
        cd pharma_pro

        cat > lib/main.dart << 'EOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/services.dart';

        void main() {
          WidgetsFlutterBinding.ensureInitialized();
          SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
            statusBarColor: Colors.transparent,
            statusBarIconBrightness: Brightness.dark,
          ));
          runApp(const PharmaProApp());
        }

        class PharmaProApp extends StatelessWidget {
          const PharmaProApp({super.key});
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'PharmaMate Pro',
              debugShowCheckedModeBanner: false,
              theme: ThemeData(
                useMaterial3: true,
                colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF2563EB)),
                scaffoldBackgroundColor: const Color(0xFFF8FAFC),
                cardTheme: CardTheme(
                  elevation: 0,
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20)),
                  color: Colors.white,
                ),
              ),
              home: const MainShell(),
            );
          }
        }

        class Product {
          final String brand;
          final String title;
          final String subtitle;
          final double price;
          final String image;
          bool isFav;
          Product(this.brand, this.title, this.subtitle, this.price, this.image, {this.isFav = false});
        }

        class CategoryItem {
          final String name;
          final IconData icon;
          final Color bg;
          CategoryItem(this.name, this.icon, this.bg);
        }

        final List<CategoryItem> categories = [
          CategoryItem('Care', Icons.spa_outlined, const Color(0xFFFFF1E6)),
          CategoryItem('Heart', Icons.favorite_border, const Color(0xFFFFE8EC)),
          CategoryItem('Brain', Icons.psychology_outlined, const Color(0xFFF0ECFF)),
          CategoryItem('Stomach', Icons.restaurant_outlined, const Color(0xFFE6F7ED)),
          CategoryItem('Lung', Icons.air_outlined, const Color(0xFFE6F0FF)),
        ];

        final List<Product> demoProducts = [
          Product('Pampers', 'Baby diapers', 'Size - 2 (4-8 kg), 68 pcs', 25, 'https://dummyimage.com/400x400/EEF4FF/2563EB&text=Pampers'),
          Product('Now Foods', 'Omega-3', '30 softgels', 18, 'https://dummyimage.com/400x400/FFF4E6/E67E22&text=Omega', isFav: true),
          Product('Huggies', 'Wet wipes', '56 pcs', 12, 'https://dummyimage.com/400x400/E6F7FF/0EA5E9&text=Wipes', isFav: true),
          Product('Mustela', 'Gentle shampoo', '500 ml', 28, 'https://dummyimage.com/400x400/F5F3FF/7C3AED&text=Mustela', isFav: true),
          Product('Weleda', 'Body Wash', '200 ml', 23, 'https://dummyimage.com/400x400/ECFDF5/10B981&text=Weleda'),
          Product('Aquaphor', 'Advanced Therapy', '50 ml', 15, 'https://dummyimage.com/400x400/FEF2F2/EF4444&text=Aquaphor', isFav: true),
        ];

        class MainShell extends StatefulWidget {
          const MainShell({super.key});
          @override
          State<MainShell> createState() => _MainShellState();
        }

        class _MainShellState extends State<MainShell> {
          int _index = 0;
          final List<Product> cart = [];

          @override
          Widget build(BuildContext context) {
            final pages = [
              HomePage(onAddCart: (p) => setState(() => cart.add(p)), onOpenCategory: () => setState(() => _index = 4)),
              const FavoritesPage(),
              CartPage(cart: cart),
              const ProfilePage(),
              CategoryPage(onAddCart: (p) => setState(() => cart.add(p))),
            ];
            return Scaffold(
              body: pages[_index > 3? 4 : _index],
              bottomNavigationBar: Container(
                decoration: BoxDecoration(
                  color: Colors.white,
                  boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.06), blurRadius: 20, offset: const Offset(0,-4))],
                  borderRadius: const BorderRadius.vertical(top: Radius.circular(24)),
                ),
                child: ClipRRect(
                  borderRadius: const BorderRadius.vertical(top: Radius.circular(24)),
                  child: BottomNavigationBar(
                    currentIndex: _index > 3? 0 : _index,
                    onTap: (i) => setState(() => _index = i),
                    type: BottomNavigationBarType.fixed,
                    backgroundColor: Colors.white,
                    selectedItemColor: const Color(0xFF2563EB),
                    unselectedItemColor: Colors.grey,
                    showUnselectedLabels: false,
                    items: const [
                      BottomNavigationBarItem(icon: Icon(Icons.home_outlined), activeIcon: Icon(Icons.home), label: 'Accueil'),
                      BottomNavigationBarItem(icon: Icon(Icons.favorite_border), activeIcon: Icon(Icons.favorite), label: 'Favoris'),
                      BottomNavigationBarItem(icon: Icon(Icons.shopping_cart_outlined), activeIcon: Icon(Icons.shopping_cart), label: 'Panier'),
                      BottomNavigationBarItem(icon: Icon(Icons.person_outline), activeIcon: Icon(Icons.person), label: 'Profil'),
                    ],
                  ),
                ),
              ),
            );
          }
        }

        class HomePage extends StatelessWidget {
          final Function(Product) onAddCart;
          final VoidCallback onOpenCategory;
          const HomePage({super.key, required this.onAddCart, required this.onOpenCategory});

          @override
          Widget build(BuildContext context) {
            return SafeArea(
              child: CustomScrollView(
                slivers: [
                  SliverToBoxAdapter(child: Padding(
                    padding: const EdgeInsets.fromLTRB(20,16,20,8),
                    child: Row(
                      children: [
                        const Icon(Icons.local_pharmacy, color: Color(0xFF2563EB), size: 28),
                        const SizedBox(width: 8),
                        const Text('Pharma', style: TextStyle(fontSize: 22, fontWeight: FontWeight.w800, color: Color(0xFF2563EB))),
                        const Text('Mate', style: TextStyle(fontSize: 22, fontWeight: FontWeight.w400, color: Color(0xFF0F172A))),
                        const Spacer(),
                        IconButton(onPressed: (){}, icon: const Icon(Icons.notifications_none_rounded)),
                      ],
                    ),
                  )),
                  SliverToBoxAdapter(child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 8),
                    child: TextField(
                      decoration: InputDecoration(
                        hintText: 'Search',
                        prefixIcon: const Icon(Icons.search),
                        filled: true,
                        fillColor: Colors.white,
                        border: OutlineInputBorder(borderRadius: BorderRadius.circular(14), borderSide: BorderSide.none),
                        contentPadding: const EdgeInsets.symmetric(vertical: 0),
                      ),
                    ),
                  )),
                  SliverToBoxAdapter(child: Padding(
                    padding: const EdgeInsets.all(20),
                    child: Container(
                      height: 150,
                      decoration: BoxDecoration(
                        gradient: const LinearGradient(colors: [Color(0xFFDCEEFF), Color(0xFFEFF6FF)]),
                        borderRadius: BorderRadius.circular(24),
                      ),
                      padding: const EdgeInsets.all(20),
                      child: Row(
                        children: [
                          Expanded(child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              Container(padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4), decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(8)), child: const Text('TODAY', style: TextStyle(fontSize: 10, fontWeight: FontWeight.bold, color: Color(0xFF2563EB)))),
                              const SizedBox(height: 8),
                              const Text('FREE shipping\nfor ALL orders', style: TextStyle(fontSize: 20, fontWeight: FontWeight.w800, height: 1.2, color: Color(0xFF0F3D7A))),
                            ],
                          )),
                          Image.network('https://dummyimage.com/200x200/DCEEFF/2563EB&text=🛍️', width: 100),
                        ],
                      ),
                    ),
                  )),
                  SliverToBoxAdapter(child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 20),
                    child: Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [
                      const Text('Categories', style: TextStyle(fontSize: 18, fontWeight: FontWeight.w700)),
                      TextButton(onPressed: (){}, child: const Text('SHOW ALL')),
                    ]),
                  )),
                  SliverToBoxAdapter(child: SizedBox(
                    height: 100,
                    child: ListView.separated(
                      padding: const EdgeInsets.symmetric(horizontal: 20),
                      scrollDirection: Axis.horizontal,
                      itemCount: categories.length,
                      separatorBuilder: (_, __) => const SizedBox(width: 14),
                      itemBuilder: (context, i) {
                        final c = categories[i];
                        return GestureDetector(
                          onTap: onOpenCategory,
                          child: Column(
                            children: [
                              Container(width: 64, height: 64, decoration: BoxDecoration(color: c.bg, shape: BoxShape.circle), child: Icon(c.icon, color: const Color(0xFF334155))),
                              const SizedBox(height: 6),
                              Text(c.name, style: const TextStyle(fontSize: 12)),
                            ],
                          ),
                        );
                      },
                    ),
                  )),
                  SliverToBoxAdapter(child: Padding(
                    padding: const EdgeInsets.fromLTRB(20,8,20,8),
                    child: Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [
                      const Text('Popular', style: TextStyle(fontSize: 18, fontWeight: FontWeight.w700)),
                      TextButton(onPressed: (){}, child: const Text('SHOW ALL')),
                    ]),
                  )),
                  SliverPadding(
                    padding: const EdgeInsets.fromLTRB(20,0,20,30),
                    sliver: SliverGrid(
                      gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(crossAxisCount: 2, mainAxisSpacing: 16, crossAxisSpacing: 16, childAspectRatio: 0.72),
                      delegate: SliverChildBuilderDelegate((context, i) {
                        final p = demoProducts[i % 2];
                        return ProductCard(product: p, onAdd: () => onAddCart(p));
                      }, childCount: 2),
                    ),
                  ),
                ],
              ),
            );
          }
        }

        class ProductCard extends StatefulWidget {
          final Product product;
          final VoidCallback onAdd;
          const ProductCard({super.key, required this.product, required this.onAdd});
          @override
          State<ProductCard> createState() => _ProductCardState();
        }

        class _ProductCardState extends State<ProductCard> {
          @override
          Widget build(BuildContext context) {
            final p = widget.product;
            return Container(
              decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(20), boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.04), blurRadius: 12)]),
              padding: const EdgeInsets.all(12),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Expanded(child: Stack(
                    children: [
                      Center(child: ClipRRect(borderRadius: BorderRadius.circular(12), child: Image.network(p.image, fit: BoxFit.cover))),
                      Positioned(right: 0, top: 0, child: GestureDetector(onTap: () => setState(() => p.isFav =!p.isFav), child: Icon(p.isFav? Icons.favorite : Icons.favorite_border, color: p.isFav? Colors.red : Colors.grey))),
                    ],
                  )),
                  const SizedBox(height: 8),
                  Text(p.brand, style: const TextStyle(fontSize: 11, color: Colors.grey)),
                  Text(p.title, style: const TextStyle(fontWeight: FontWeight.w700)),
                  Text(p.subtitle, style: const TextStyle(fontSize: 11, color: Colors.grey)),
                  const SizedBox(height: 8),
                  Row(
                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                    children: [
                      Text('\$${p.price.toInt()}', style: const TextStyle(fontSize: 18, fontWeight: FontWeight.w800)),
                      InkWell(onTap: widget.onAdd, borderRadius: BorderRadius.circular(10), child: Container(padding: const EdgeInsets.all(8), decoration: BoxDecoration(color: const Color(0xFF2563EB), borderRadius: BorderRadius.circular(10)), child: const Icon(Icons.shopping_cart_outlined, color: Colors.white, size: 18))),
                    ],
                  )
                ],
              ),
            );
          }
        }

        class CategoryPage extends StatefulWidget {
          final Function(Product) onAddCart;
          const CategoryPage({super.key, required this.onAddCart});
          @override
          State<CategoryPage> createState() => _CategoryPageState();
        }

        class _CategoryPageState extends State<CategoryPage> {
          String selected = 'Baby & Kids';
          final tabs = ['Baby & Kids', 'Body', 'Teeth & Mouth', 'Face'];
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(backgroundColor: Colors.transparent, elevation: 0, leading: const BackButton(), title: const Row(children: [Icon(Icons.spa_outlined, color: Color(0xFFFFA726)), SizedBox(width: 6), Text('Care')])),
              body: Column(
                children: [
                  Padding(padding: const EdgeInsets.symmetric(horizontal: 20), child: TextField(decoration: InputDecoration(hintText: 'Search', prefixIcon: const Icon(Icons.search), filled: true, fillColor: Colors.white, border: OutlineInputBorder(borderRadius: BorderRadius.circular(14), borderSide: BorderSide.none)))),
                  const SizedBox(height: 12),
                  SizedBox(height: 40, child: ListView.separated(padding: const EdgeInsets.symmetric(horizontal: 20), scrollDirection: Axis.horizontal, itemBuilder: (_, i) => ChoiceChip(label: Text(tabs[i]), selected: selected == tabs[i], onSelected: (_) => setState(() => selected = tabs[i])), separatorBuilder: (_, __) => const SizedBox(width: 8), itemCount: tabs.length)),
                  const SizedBox(height: 12),
                  Expanded(child: GridView.builder(padding: const EdgeInsets.all(20), gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(crossAxisCount: 2, mainAxisSpacing: 16, crossAxisSpacing: 16, childAspectRatio: 0.72), itemCount: demoProducts.length, itemBuilder: (_, i) => ProductCard(product: demoProducts[i], onAdd: () => widget.onAddCart(demoProducts[i])))),
                ],
              ),
            );
          }
        }

        class FavoritesPage extends StatelessWidget {
          const FavoritesPage({super.key});
          @override
          Widget build(BuildContext context) {
            final favs = demoProducts.where((p) => p.isFav).toList();
            return Scaffold(appBar: AppBar(title: const Text('Favoris'), backgroundColor: Colors.transparent), body: ListView.separated(padding: const EdgeInsets.all(20), itemBuilder: (_, i) => ListTile(leading: Image.network(favs[i].image, width: 50), title: Text(favs[i].title), subtitle: Text('\$${favs[i].price}'), trailing: const Icon(Icons.favorite, color: Colors.red)), separatorBuilder: (_, __) => const Divider(), itemCount: favs.length));
          }
        }

        class CartPage extends StatelessWidget {
          final List<Product> cart;
          const CartPage({super.key, required this.cart});
          @override
          Widget build(BuildContext context) {
            final total = cart.fold<double>(0, (s, p) => s + p.price);
            return Scaffold(
              appBar: AppBar(title: const Text('Panier'), backgroundColor: Colors.transparent),
              body: Column(children: [
                Expanded(child: ListView.separated(padding: const EdgeInsets.all(20), itemBuilder: (_, i) => ListTile(leading: Image.network(cart[i].image, width: 50), title: Text(cart[i].title), trailing: Text('\$${cart[i].price}')), separatorBuilder: (_, __) => const Divider(), itemCount: cart.length)),
                Container(padding: const EdgeInsets.all(20), decoration: const BoxDecoration(color: Colors.white, borderRadius: BorderRadius.vertical(top: Radius.circular(24))), child: Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [Text('Total: \$${total.toStringAsFixed(0)}', style: const TextStyle(fontSize: 18, fontWeight: FontWeight.w800)), FilledButton(onPressed: (){}, child: const Text('Commander'))])),
              ]),
            );
          }
        }

        class ProfilePage extends StatelessWidget {
          const ProfilePage({super.key});
          @override
          Widget build(BuildContext context) {
            return Scaffold(appBar: AppBar(title: const Text('Profil'), backgroundColor: Colors.transparent), body: const Center(child: Text('Amine • PharmaMate Pro', style: TextStyle(fontSize: 18, fontWeight: FontWeight.w600))));
          }
        }
        EOF

        cat > pubspec.yaml << 'PUBEOF'
        name: pharma_pro
        description: متجر صيدلية إلكتروني بريميوم
        version: 1.0.0+1
        publish_to: none
        environment:
          sdk: '>=3.3.0 <4.0.0'
        dependencies:
          flutter:
            sdk: flutter
        flutter:
          uses-material-design: true
        PUBEOF

        flutter clean
        flutter pub get
        flutter build apk --release
        cp build/app/outputs/flutter-apk/app-release.apk../pharma-premium.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pharma-premium-pro
        path: pharma-premium.apk
