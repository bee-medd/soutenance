name: Build Professional Premium App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create Professional App
      run: |
        flutter create pro_app
        cd pro_app

        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/services.dart';

        void main() {
          WidgetsFlutterBinding.ensureInitialized();
          SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
          SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
            statusBarColor: Colors.transparent,
            statusBarIconBrightness: Brightness.light,
          ));
          runApp(const ProApp());
        }

        class ProApp extends StatelessWidget {
          const ProApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Détox Pro',
              theme: ThemeData(
                brightness: Brightness.light,
                primarySwatch: Colors.grey,
                scaffoldBackgroundColor: const Color(0xFFFAFAFA),
                useMaterial3: true,
                cardTheme: CardTheme(
                  elevation: 0,
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(28)),
                  clipBehavior: Clip.antiAlias,
                ),
                appBarTheme: const AppBarTheme(
                  backgroundColor: Colors.transparent,
                  elevation: 0,
                  centerTitle: false,
                  titleTextStyle: TextStyle(fontSize: 28, fontWeight: FontWeight.w700, color: Color(0xFF1A1A1A)),
                  systemOverlayStyle: SystemUiOverlayStyle.dark,
                ),
              ),
              debugShowCheckedModeBanner: false,
              home: const PremiumHome(),
            );
          }
        }

        class PremiumHome extends StatefulWidget {
          const PremiumHome({super.key});

          @override
          State<PremiumHome> createState() => _PremiumHomeState();
        }

        class _PremiumHomeState extends State<PremiumHome> with TickerProviderStateMixin {
          int _selectedIndex = 0;
          late PageController _pageController;
          late AnimationController _fabController;
          
          final List<Widget> _pages = const [
            ExplorePage(),
            StatsPage(),
            ProfilePage(),
          ];

          @override
          void initState() {
            super.initState();
            _pageController = PageController();
            _fabController = AnimationController(
              vsync: this,
              duration: const Duration(milliseconds: 300),
            );
          }

          @override
          void dispose() {
            _pageController.dispose();
            _fabController.dispose();
            super.dispose();
          }

          void _onTap(int index) {
            setState(() => _selectedIndex = index);
            _pageController.animateToPage(
              index,
              duration: const Duration(milliseconds: 300),
              curve: Curves.easeOutCubic,
            );
            if (index == 1) _fabController.forward();
            else _fabController.reverse();
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              extendBody: true,
              body: PageView(
                controller: _pageController,
                onPageChanged: (index) => setState(() => _selectedIndex = index),
                children: _pages,
              ),
              bottomNavigationBar: _buildNavBar(),
              floatingActionButton: AnimatedBuilder(
                animation: _fabController,
                builder: (context, child) {
                  return Transform.scale(
                    scale: _fabController.value,
                    child: FloatingActionButton(
                      onPressed: () {},
                      backgroundColor: const Color(0xFF6C63FF),
                      elevation: 0,
                      child: const Icon(Icons.add, color: Colors.white, size: 30),
                    ),
                  );
                },
              ),
              floatingActionButtonLocation: FloatingActionButtonLocation.centerDocked,
            );
          }

          Widget _buildNavBar() {
            return Container(
              decoration: BoxDecoration(
                boxShadow: [
                  BoxShadow(
                    color: Colors.black.withOpacity(0.05),
                    blurRadius: 20,
                    offset: const Offset(0, -5),
                  ),
                ],
              ),
              child: ClipRRect(
                borderRadius: const BorderRadius.vertical(top: Radius.circular(30)),
                child: BottomNavigationBar(
                  currentIndex: _selectedIndex,
                  onTap: _onTap,
                  type: BottomNavigationBarType.fixed,
                  backgroundColor: Colors.white,
                  selectedItemColor: const Color(0xFF6C63FF),
                  unselectedItemColor: Colors.grey.shade500,
                  selectedLabelStyle: const TextStyle(fontWeight: FontWeight.w600, fontSize: 12),
                  unselectedLabelStyle: const TextStyle(fontSize: 12),
                  elevation: 0,
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.explore_outlined), activeIcon: Icon(Icons.explore), label: 'Explorer'),
                    BottomNavigationBarItem(icon: Icon(Icons.show_chart_outlined), activeIcon: Icon(Icons.show_chart), label: 'Stats'),
                    BottomNavigationBarItem(icon: Icon(Icons.person_outline), activeIcon: Icon(Icons.person), label: 'Moi'),
                  ],
                ),
              ),
            );
          }
        }

        class ExplorePage extends StatelessWidget {
          const ExplorePage({super.key});

          @override
          Widget build(BuildContext context) {
            return CustomScrollView(
              slivers: [
                SliverAppBar(
                  expandedHeight: 280,
                  floating: false,
                  pinned: true,
                  flexibleSpace: FlexibleSpaceBar(
                    background: Container(
                      decoration: const BoxDecoration(
                        gradient: LinearGradient(
                          begin: Alignment.topLeft,
                          end: Alignment.bottomRight,
                          colors: [Color(0xFF6C63FF), Color(0xFF3F3D99)],
                        ),
                      ),
                      child: SafeArea(
                        child: Padding(
                          padding: const EdgeInsets.all(24),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            mainAxisAlignment: MainAxisAlignment.end,
                            children: [
                              const Text(
                                'Bonjour,\nAmine',
                                style: TextStyle(fontSize: 34, fontWeight: FontWeight.bold, color: Colors.white),
                              ),
                              const SizedBox(height: 8),
                              Text(
                                'Prêt pour une journée sans stress ?',
                                style: TextStyle(fontSize: 16, color: Colors.white.withOpacity(0.8)),
                              ),
                            ],
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
                SliverPadding(
                  padding: const EdgeInsets.all(20),
                  sliver: SliverList(
                    delegate: SliverChildListDelegate([
                      const Text('Recommandés pour vous', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                      const SizedBox(height: 16),
                      _buildRecommendations(),
                      const SizedBox(height: 32),
                      const Text('Catégories', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                      const SizedBox(height: 16),
                      _buildCategories(),
                    ]),
                  ),
                ),
              ],
            );
          }

          Widget _buildRecommendations() {
            final List<Map<String, dynamic>> items = [
              {'title': 'Méditation guidée', 'duration': '10 min', 'emoji': '🧘', 'color': 0xFFE8F0FE},
              {'title': 'Défi 7 jours', 'duration': 'Démarrage', 'emoji': '🏆', 'color': 0xFFFFF0F0},
              {'title': 'Respiration', 'duration': '5 min', 'emoji': '🌬️', 'color': 0xFFE6F7F0},
            ];
            return SizedBox(
              height: 180,
              child: ListView.builder(
                scrollDirection: Axis.horizontal,
                itemCount: items.length,
                itemBuilder: (context, index) {
                  final item = items[index];
                  final colorValue = item['color'] as int;
                  final titleValue = item['title'] as String;
                  final durationValue = item['duration'] as String;
                  final emojiValue = item['emoji'] as String;
                  return Container(
                    width: 160,
                    margin: const EdgeInsets.only(right: 16),
                    decoration: BoxDecoration(
                      color: Color(colorValue),
                      borderRadius: BorderRadius.circular(24),
                    ),
                    child: Padding(
                      padding: const EdgeInsets.all(16),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        mainAxisAlignment: MainAxisAlignment.end,
                        children: [
                          Text(emojiValue, style: const TextStyle(fontSize: 40)),
                          const SizedBox(height: 12),
                          Text(titleValue, style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                          Text(durationValue, style: TextStyle(fontSize: 12, color: Colors.grey.shade600)),
                        ],
                      ),
                    ),
                  );
                },
              ),
            );
          }

          Widget _buildCategories() {
            final List<Map<String, dynamic>> categories = [
              {'icon': Icons.self_improvement, 'name': 'Méditation', 'color': 0xFFE8F0FE, 'iconColor': 0xFF4A90E2},
              {'icon': Icons.fitness_center, 'name': 'Sport', 'color': 0xFFE6F7F0, 'iconColor': 0xFF27AE60},
              {'icon': Icons.menu_book, 'name': 'Lecture', 'color': 0xFFFEF3E8, 'iconColor': 0xFFE67E22},
              {'icon': Icons.spa, 'name': 'Bien-être', 'color': 0xFFEDE7F6, 'iconColor': 0xFF9B59B6},
              {'icon': Icons.kitchen, 'name': 'Cuisine', 'color': 0xFFFFF5E0, 'iconColor': 0xFFE67E22},
              {'icon': Icons.bedtime, 'name': 'Sommeil', 'color': 0xFFE3F2FD, 'iconColor': 0xFF2980B9},
            ];
            return GridView.builder(
              shrinkWrap: true,
              physics: const NeverScrollableScrollPhysics(),
              gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                crossAxisCount: 2,
                crossAxisSpacing: 16,
                mainAxisSpacing: 16,
                childAspectRatio: 1.2,
              ),
              itemCount: categories.length,
              itemBuilder: (context, index) {
                final cat = categories[index];
                final iconValue = cat['icon'] as IconData;
                final nameValue = cat['name'] as String;
                final colorValue = cat['color'] as int;
                final iconColorValue = cat['iconColor'] as int;
                return Container(
                  decoration: BoxDecoration(
                    color: Color(colorValue),
                    borderRadius: BorderRadius.circular(24),
                  ),
                  child: Material(
                    color: Colors.transparent,
                    child: InkWell(
                      onTap: () {},
                      borderRadius: BorderRadius.circular(24),
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Icon(iconValue, size: 40, color: Color(iconColorValue)),
                          const SizedBox(height: 12),
                          Text(nameValue, style: const TextStyle(fontSize: 16, fontWeight: FontWeight.w600)),
                        ],
                      ),
                    ),
                  ),
                );
              },
            );
          }
        }

        class StatsPage extends StatelessWidget {
          const StatsPage({super.key});

          @override
          Widget build(BuildContext context) {
            final List<Map<String, dynamic>> statsList = [
              {'value': '4h 32m', 'label': 'Aujourd\'hui', 'icon': Icons.timer, 'color': 0xFFFF6B6B},
              {'value': '32h', 'label': 'Cette semaine', 'icon': Icons.calendar_today, 'color': 0xFF4ECDC4},
              {'value': '-23%', 'label': 'vs semaine dernière', 'icon': Icons.trending_down, 'color': 0xFF45B7D1},
              {'value': '8/10', 'label': 'Score bien-être', 'icon': Icons.emoji_events, 'color': 0xFFF7B731},
            ];
            return Container(
              decoration: const BoxDecoration(
                gradient: LinearGradient(
                  begin: Alignment.topCenter,
                  end: Alignment.bottomCenter,
                  colors: [Color(0xFF6C63FF), Color(0xFF3F3D99)],
                ),
              ),
              child: SafeArea(
                child: CustomScrollView(
                  slivers: [
                    const SliverAppBar(
                      title: Text('Statistiques', style: TextStyle(color: Colors.white)),
                      backgroundColor: Colors.transparent,
                      elevation: 0,
                    ),
                    SliverPadding(
                      padding: const EdgeInsets.all(20),
                      sliver: SliverGrid(
                        gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                          crossAxisCount: 2,
                          crossAxisSpacing: 16,
                          mainAxisSpacing: 16,
                          childAspectRatio: 1.1,
                        ),
                        delegate: SliverChildBuilderDelegate(
                          (context, index) {
                            final stat = statsList[index];
                            final iconValue = stat['icon'] as IconData;
                            final valueValue = stat['value'] as String;
                            final labelValue = stat['label'] as String;
                            final colorValue = stat['color'] as int;
                            return Container(
                              decoration: BoxDecoration(
                                color: Color(colorValue).withOpacity(0.2),
                                borderRadius: BorderRadius.circular(28),
                                border: Border.all(color: Colors.white.withOpacity(0.2)),
                              ),
                              child: Column(
                                mainAxisAlignment: MainAxisAlignment.center,
                                children: [
                                  Icon(iconValue, size: 32, color: Colors.white),
                                  const SizedBox(height: 12),
                                  Text(valueValue, style: const TextStyle(fontSize: 24, fontWeight: FontWeight.bold, color: Colors.white)),
                                  Text(labelValue, style: TextStyle(fontSize: 12, color: Colors.white.withOpacity(0.7))),
                                ],
                              ),
                            );
                          },
                          childCount: statsList.length,
                        ),
                      ),
                    ),
                  ],
                ),
              ),
            );
          }
        }

        class ProfilePage extends StatelessWidget {
          const ProfilePage({super.key});

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: const Color(0xFFFAFAFA),
              appBar: AppBar(
                title: const Text('Mon Profil'),
                actions: [
                  IconButton(onPressed: () {}, icon: const Icon(Icons.settings_outlined)),
                ],
              ),
              body: ListView(
                padding: const EdgeInsets.all(20),
                children: [
                  Center(
                    child: Column(
                      children: [
                        Container(
                          width: 100,
                          height: 100,
                          decoration: BoxDecoration(
                            gradient: const LinearGradient(colors: [Color(0xFF6C63FF), Color(0xFF3F3D99)]),
                            borderRadius: BorderRadius.circular(50),
                          ),
                          child: const Center(
                            child: Text('A', style: TextStyle(fontSize: 40, color: Colors.white, fontWeight: FontWeight.bold)),
                          ),
                        ),
                        const SizedBox(height: 12),
                        const Text('Amine Benali', style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold)),
                        const Text('amine@detox.com', style: TextStyle(color: Colors.grey)),
                      ],
                    ),
                  ),
                  const SizedBox(height: 32),
                  _buildMenuItem(Icons.flag_outlined, 'Mes objectifs', '80% complétés'),
                  _buildMenuItem(Icons.emoji_events_outlined, 'Mes trophées', '12 gagnés'),
                  _buildMenuItem(Icons.notifications_outlined, 'Notifications', 'Activées'),
                  _buildMenuItem(Icons.lock_outlined, 'Confidentialité', 'Gérer'),
                  const SizedBox(height: 20),
                  Container(
                    decoration: BoxDecoration(
                      gradient: const LinearGradient(colors: [Color(0xFF6C63FF), Color(0xFF3F3D99)]),
                      borderRadius: BorderRadius.circular(28),
                    ),
                    child: ListTile(
                      onTap: () {},
                      leading: const Icon(Icons.logout, color: Colors.white),
                      title: const Text('Déconnexion', style: TextStyle(color: Colors.white)),
                      trailing: const Icon(Icons.arrow_forward, color: Colors.white),
                    ),
                  ),
                ],
              ),
            );
          }

          Widget _buildMenuItem(IconData icon, String title, String subtitle) {
            return Container(
              margin: const EdgeInsets.only(bottom: 12),
              decoration: BoxDecoration(
                color: Colors.white,
                borderRadius: BorderRadius.circular(20),
                boxShadow: [
                  BoxShadow(color: Colors.black.withOpacity(0.03), blurRadius: 10, offset: const Offset(0, 2)),
                ],
              ),
              child: ListTile(
                leading: Icon(icon, color: const Color(0xFF6C63FF)),
                title: Text(title, style: const TextStyle(fontWeight: FontWeight.w600)),
                subtitle: Text(subtitle),
                trailing: const Icon(Icons.chevron_right),
                onTap: () {},
              ),
            );
          }
        }
        DARTEOF

        cat > pubspec.yaml << 'PUBEOF'
        name: pro_app
        description: Application de détox numérique premium
        version: 1.0.0+1
        publish_to: none

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter

        flutter:
          uses-material-design: true
        PUBEOF

        flutter clean
        flutter pub get
        flutter build apk --release
        cp build/app/outputs/flutter-apk/app-release.apk ../detox-premium.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: detox-premium-pro
        path: detox-premium.apk
