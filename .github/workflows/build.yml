name: Build E-Commerce Premium App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # إعداد بيئة جافا المتوافقة مع أندرويد الحديث
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # تفعيل الكاش لتسريع عملية الـ Compilation المستقبلية
    - name: Cache Flutter & Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-ecommerce-final-build-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-ecommerce-final-build-

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create E-Commerce App
      run: |
        flutter create ecommerce_app
        cd ecommerce_app

        # حقن الكود المصدري للتطبيق بالكامل وإغلاق الأقواس هندسياً
        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/services.dart';

        void main() {
          WidgetsFlutterBinding.ensureInitialized();
          SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
          SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
            statusBarColor: Colors.transparent,
            statusBarIconBrightness: Brightness.dark,
          ));
          runApp(const ECommerceApp());
        }

        // ==================== MODELS ====================
        class Product {
          final String id;
          final String name;
          final String category;
          final double price;
          final double oldPrice;
          final double rating;
          final int reviews;
          final Color color;
          final IconData icon;
          bool isFavorite;

          Product({
            required this.id,
            required this.name,
            required this.category,
            required this.price,
            required this.oldPrice,
            required this.rating,
            required this.reviews,
            required this.color,
            required this.icon,
            this.isFavorite = false,
          });
        }

        // ==================== DATA ====================
        final List<Product> products = [
          Product(
            id: '1', name: 'Premium Headphones', category: 'Electronics',
            price: 129.99, oldPrice: 199.99, rating: 4.8, reviews: 2341,
            color: const Color(0xFF6C63FF), icon: Icons.headphones,
          ),
          Product(
            id: '2', name: 'Smart Watch Pro', category: 'Wearables',
            price: 249.99, oldPrice: 349.99, rating: 4.9, reviews: 1876,
            color: const Color(0xFFFF6584), icon: Icons.watch,
          ),
          Product(
            id: '3', name: 'Wireless Speaker', category: 'Audio',
            price: 89.99, oldPrice: 129.99, rating: 4.7, reviews: 3102,
            color: const Color(0xFF43C6AC), icon: Icons.speaker,
          ),
          Product(
            id: '4', name: 'Gaming Mouse', category: 'Gaming',
            price: 59.99, oldPrice: 89.99, rating: 4.6, reviews: 987,
            color: const Color(0xFFFF9A3C), icon: Icons.mouse,
          ),
          Product(
            id: '5', name: 'Mechanical Keyboard', category: 'Gaming',
            price: 149.99, oldPrice: 199.99, rating: 4.8, reviews: 1543,
            color: const Color(0xFF667EEA), icon: Icons.keyboard,
          ),
          Product(
            id: '6', name: 'USB-C Hub Pro', category: 'Accessories',
            price: 49.99, oldPrice: 79.99, rating: 4.5, reviews: 654,
            color: const Color(0xFF11998E), icon: Icons.usb,
          ),
        ];

        // ==================== APP ====================
        class ECommerceApp extends StatelessWidget {
          const ECommerceApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'ShopLux',
              debugShowCheckedModeBanner: false,
              theme: ThemeData(
                useMaterial3: true,
                colorScheme: ColorScheme.fromSeed(
                  seedColor: const Color(0xFF6C63FF),
                  brightness: Brightness.light,
                ),
                fontFamily: 'Roboto',
              ),
              home: const MainScreen(),
            );
          }
        }

        // ==================== MAIN SCREEN ====================
        class MainScreen extends StatefulWidget {
          const MainScreen({super.key});

          @override
          State<MainScreen> createState() => _MainScreenState();
        }

        class _MainScreenState extends State<MainScreen> {
          int _currentIndex = 0;
          int _cartCount = 0;

          void _addToCart() {
            setState(() => _cartCount++);
          }

          @override
          Widget build(BuildContext context) {
            final screens = [
              HomeScreen(onAddToCart: _addToCart),
              const ExploreScreen(),
              CartScreen(cartCount: _cartCount),
              const ProfileScreen(),
            ];

            return Scaffold(
              body: screens[_currentIndex],
              bottomNavigationBar: _buildBottomNav(),
            );
          }

          Widget _buildBottomNav() {
            return Container(
              decoration: BoxDecoration(
                color: Colors.white,
                boxShadow: [
                  BoxShadow(
                    color: Colors.black.withOpacity(0.08),
                    blurRadius: 20,
                    offset: const Offset(0, -5),
                  ),
                ],
              ),
              child: SafeArea(
                child: Padding(
                  padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 8),
                  child: Row(
                    mainAxisAlignment: MainAxisAlignment.spaceAround,
                    children: [
                      _buildNavItem(0, Icons.home_rounded, Icons.home_outlined, 'Home'),
                      _buildNavItem(1, Icons.explore_rounded, Icons.explore_outlined, 'Explore'),
                      _buildCartNavItem(),
                      _buildNavItem(3, Icons.person_rounded, Icons.person_outlined, 'Profile'),
                    ],
                  ),
                ),
              ),
            );
          }

          Widget _buildNavItem(int index, IconData activeIcon, IconData inactiveIcon, String label) {
            final isActive = _currentIndex == index;
            return GestureDetector(
              onTap: () => setState(() => _currentIndex = index),
              child: AnimatedContainer(
                duration: const Duration(milliseconds: 200),
                padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 8),
                decoration: BoxDecoration(
                  color: isActive ? const Color(0xFF6C63FF).withOpacity(0.1) : Colors.transparent,
                  borderRadius: BorderRadius.circular(12),
                ),
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    Icon(
                      isActive ? activeIcon : inactiveIcon,
                      color: isActive ? const Color(0xFF6C63FF) : Colors.grey,
                      size: 24,
                    ),
                    const SizedBox(height: 2),
                    Text(
                      label,
                      style: TextStyle(
                        fontSize: 10,
                        fontWeight: isActive ? FontWeight.w600 : FontWeight.normal,
                        color: isActive ? const Color(0xFF6C63FF) : Colors.grey,
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          Widget _buildCartNavItem() {
            final isActive = _currentIndex == 2;
            return GestureDetector(
              onTap: () => setState(() => _currentIndex = 2),
              child: AnimatedContainer(
                duration: const Duration(milliseconds: 200),
                padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 8),
                decoration: BoxDecoration(
                  color: isActive ? const Color(0xFF6C63FF).withOpacity(0.1) : Colors.transparent,
                  borderRadius: BorderRadius.circular(12),
                ),
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    Stack(
                      clipBehavior: Clip.none,
                      children: [
                        Icon(
                          isActive ? Icons.shopping_bag_rounded : Icons.shopping_bag_outlined,
                          color: isActive ? const Color(0xFF6C63FF) : Colors.grey,
                          size: 24,
                        ),
                        if (_cartCount > 0)
                          Positioned(
                            right: -6,
                            top: -6,
                            child: Container(
                              padding: const EdgeInsets.all(4),
                              decoration: const BoxDecoration(
                                color: Color(0xFFFF6584),
                                shape: BoxShape.circle,
                              ),
                              child: Text(
                                '$_cartCount',
                                style: const TextStyle(
                                  color: Colors.white,
                                  fontSize: 8,
                                  fontWeight: FontWeight.bold,
                                ),
                              ),
                            ),
                          ),
                      ],
                    ),
                    const SizedBox(height: 2),
                    Text(
                      'Cart',
                      style: TextStyle(
                        fontSize: 10,
                        fontWeight: isActive ? FontWeight.w600 : FontWeight.normal,
                        color: isActive ? const Color(0xFF6C63FF) : Colors.grey,
                      ),
                    ),
                  ],
                ),
              ),
            );
          }
        }

        // ==================== HOME SCREEN ====================
        class HomeScreen extends StatefulWidget {
          final VoidCallback onAddToCart;
          const HomeScreen({super.key, required this.onAddToCart});

          @override
          State<HomeScreen> createState() => _HomeScreenState();
        }

        class _HomeScreenState extends State<HomeScreen> {
          int _selectedCategory = 0;
          final List<String> categories = ['All', 'Electronics', 'Wearables', 'Audio', 'Gaming'];

          List<Product> get filteredProducts {
            if (_selectedCategory == 0) return products;
            return products.where((p) => p.category == categories[_selectedCategory]).toList();
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: const Color(0xFFF8F9FE),
              body: CustomScrollView(
                slivers: [
                  _buildAppBar(),
                  SliverToBoxAdapter(child: _buildSearchBar()),
                  SliverToBoxAdapter(child: _buildBanner()),
                  SliverToBoxAdapter(child: _buildCategories()),
                  SliverToBoxAdapter(child: _buildSectionTitle('Featured Products', 'See All')),
                  SliverToBoxAdapter(child: _buildFeaturedProducts()),
                  SliverToBoxAdapter(child: _buildSectionTitle('All Products', '')),
                  _buildProductGrid(),
                  const SliverToBoxAdapter(child: SizedBox(height: 100)),
                ],
              ),
            );
          }

          Widget _buildAppBar() {
            return SliverAppBar(
              expandedHeight: 0,
              floating: true,
              backgroundColor: const Color(0xFFF8F9FE),
              elevation: 0,
              title: Row(
                children: [
                  Container(
                    width: 36,
                    height: 36,
                    decoration: BoxDecoration(
                      gradient: const LinearGradient(
                        colors: [Color(0xFF6C63FF), Color(0xFF9C8FFF)],
                      ),
                      borderRadius: BorderRadius.circular(10),
                    ),
                    child: const Icon(Icons.shopping_bag_rounded, color: Colors.white, size: 20),
                  ),
                  const SizedBox(width: 10),
                  const Text(
                    'ShopLux',
                    style: TextStyle(
                      fontSize: 22,
                      fontWeight: FontWeight.w800,
                      color: Color(0xFF1A1A2E),
                    ),
                  ),
                ],
              ),
              actions: [
                IconButton(
                  icon: const Icon(Icons.notifications_outlined, color: Color(0xFF1A1A2E)),
                  onPressed: () {},
                ),
                const SizedBox(width: 8),
              ],
            );
          }

          Widget _buildSearchBar() {
            return Padding(
              padding: const EdgeInsets.fromLTRB(16, 8, 16, 16),
              child: Container(
                decoration: BoxDecoration(
                  color: Colors.white,
                  borderRadius: BorderRadius.circular(16),
                  boxShadow: [
                    BoxShadow(
                      color: Colors.black.withOpacity(0.06),
                      blurRadius: 10,
                      offset: const Offset(0, 4),
                    ),
                  ],
                ),
                child: TextField(
                  decoration: InputDecoration(
                    hintText: 'Search products...',
                    hintStyle: TextStyle(color: Colors.grey.shade400, fontSize: 14),
                    prefixIcon: Icon(Icons.search_rounded, color: Colors.grey.shade400),
                    suffixIcon: Container(
                      margin: const EdgeInsets.all(8),
                      decoration: BoxDecoration(
                        gradient: const LinearGradient(
                          colors: [Color(0xFF6C63FF), Color(0xFF9C8FFF)],
                        ),
                        borderRadius: BorderRadius.circular(10),
                      ),
                      child: const Icon(Icons.tune_rounded, color: Colors.white, size: 18),
                    ),
                    border: InputBorder.none,
                    contentPadding: const EdgeInsets.symmetric(vertical: 14),
                  ),
                ),
              ),
            );
          }

          Widget _buildBanner() {
            return Padding(
              padding: const EdgeInsets.fromLTRB(16, 0, 16, 20),
              child: Container(
                height: 160,
                decoration: BoxDecoration(
                  gradient: const LinearGradient(
                    begin: Alignment.topLeft,
                    end: Alignment.bottomRight,
                    colors: [Color(0xFF6C63FF), Color(0xFF9C8FFF), Color(0xFFFF6584)],
                  ),
                  borderRadius: BorderRadius.circular(20),
                  boxShadow: [
                    BoxShadow(
                      color: const Color(0xFF6C63FF).withOpacity(0.3),
                      blurRadius: 15,
                      offset: const Offset(0, 8),
                    ),
                  ],
                ),
                child: Stack(
                  children: [
                    Positioned(
                      right: -20,
                      top: -20,
                      child: Container(
                        width: 120,
                        height: 120,
                        decoration: BoxDecoration(
                          shape: BoxShape.circle,
                          color: Colors.white.withOpacity(0.1),
                        ),
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(24),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Container(
                            padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 4),
                            decoration: BoxDecoration(
                              color: Colors.white.withOpacity(0.2),
                              borderRadius: BorderRadius.circular(20),
                            ),
                            child: const Text(
                              '🔥 LIMITED OFFER',
                              style: TextStyle(color: Colors.white, fontSize: 9, fontWeight: FontWeight.bold),
                            ),
                          ),
                          const SizedBox(height: 8),
                          const Text(
                            'Up to 50% OFF\nPremium Tech',
                            style: TextStyle(color: Colors.white, fontSize: 20, fontWeight: FontWeight.w800, height: 1.2),
                          ),
                          const SizedBox(height: 10),
                          Container(
                            padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 6),
                            decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(14)),
                            child: const Text('Shop Now', style: TextStyle(color: Color(0xFF6C63FF), fontSize: 11, fontWeight: FontWeight.bold)),
                          ),
                        ],
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          // ==================== استكمال الجزء المنقطع بدقة واحترافية ====================
          Widget _buildCategories() {
            return SizedBox(
              height: 40,
              child: ListView.builder(
                scrollDirection: Axis.horizontal,
                padding: const EdgeInsets.symmetric(horizontal: 16),
                itemCount: categories.length,
                itemBuilder: (context, index) {
                  final isSelected = _selectedCategory == index;
                  return Padding(
                    padding: const EdgeInsets.only(right: 10),
                    return GestureDetector(
                      onTap: () => setState(() => _selectedCategory = index),
                      child: Container(
                        padding: const EdgeInsets.symmetric(horizontal: 18),
                        decoration: BoxDecoration(
                          gradient: isSelected ? const LinearGradient(colors: [Color(0xFF6C63FF), Color(0xFF8C84FF)]) : null,
                          color: isSelected ? null : Colors.white,
                          borderRadius: BorderRadius.circular(12),
                          boxShadow: isSelected ? [BoxShadow(color: const Color(0xFF6C63FF).withOpacity(0.25), blurRadius: 8, offset: const Offset(0, 4))] : null,
                        ),
                        child: Center(
                          child: Text(
                            categories[index],
                            style: TextStyle(
                              color: isSelected ? Colors.white : Colors.grey.shade600,
                              fontWeight: isSelected ? FontWeight.bold : FontWeight.normal,
                              fontSize: 13,
                            ),
                          ),
                        ),
                      ),
                    ),
                  );
                },
              ),
            );
          }

          Widget _buildSectionTitle(String title, String action) {
            return Padding(
              padding: const EdgeInsets.fromLTRB(16, 24, 16, 12),
              child: Row(
                mainAxisAlignment: MainAxisAlignment.between,
                children: [
                  Text(title, style: const TextStyle(fontSize: 18, fontWeight: FontWeight.w700, color: Color(0xFF1A1A2E))),
                  if (action.isNotEmpty)
                    Text(action, style: const TextStyle(fontSize: 12, fontWeight: FontWeight.bold, color: Color(0xFF6C63FF))),
                ],
              ),
            );
          }

          Widget _buildFeaturedProducts() {
            return SizedBox(
              height: 170,
              child: ListView.builder(
                scrollDirection: Axis.horizontal,
                padding: const EdgeInsets.symmetric(horizontal: 16),
                itemCount: products.length > 3 ? 3 : products.length,
                itemBuilder: (context, index) {
                  final product = products[index];
                  return Container(
                    width: 280,
                    margin: const EdgeInsets.only(right: 16),
                    decoration: BoxDecoration(
                      color: product.color.withOpacity(0.1),
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Stack(
                      children: [
                        Positioned(
                          right: 10,
                          bottom: 10,
                          child: Icon(product.icon, size: 100, color: product.color.withOpacity(0.15)),
                        ),
                        Padding(
                          padding: const EdgeInsets.all(20),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              Text(product.category.toUpperCase(), style: TextStyle(color: product.color, fontSize: 10, fontWeight: FontWeight.bold, letterSpacing: 1)),
                              const SizedBox(height: 4),
                              Text(product.name, style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold, color: Color(0xFF1A1A2E))),
                              const SizedBox(height: 8),
                              Text('\$${product.price}', style: const TextStyle(fontSize: 18, fontWeight: FontWeight.black, color: Color(0xFF1A1A2E))),
                              const SizedBox(height: 10),
                              ElevatedButton(
                                style: ElevatedButton.styleFrom(
                                  backgroundColor: Colors.white,
                                  foregroundColor: product.color,
                                  elevation: 0,
                                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),
                                  padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 6),
                                ),
                                onPressed: widget.onAddToCart,
                                child: const Text('Add to Cart', style: TextStyle(fontSize: 12, fontWeight: FontWeight.bold)),
                              ),
                            ],
                          ),
                        ),
                      ],
                    ),
                  );
                },
              ),
            );
          }

          Widget _buildProductGrid() {
            final filtered = filteredProducts;
            return SliverPadding(
              padding: const EdgeInsets.symmetric(horizontal: 16),
              sliver: SliverGrid(
                gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                  crossAxisCount: 2,
                  crossAxisSpacing: 14,
                  mainAxisSpacing: 14,
                  childAspectRatio: 0.75,
                ),
                delegate: SliverChildBuilderDelegate(
                  (context, index) {
                    final product = filtered[index];
                    return Container(
                      decoration: BoxDecoration(
                        color: Colors.white,
                        borderRadius: BorderRadius.circular(18),
                        boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.03), blurRadius: 10, offset: const Offset(0, 4))],
                      ),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Expanded(
                            child: Stack(
                              children: [
                                Container(
                                  margin: const EdgeInsets.all(8),
                                  decoration: BoxDecoration(
                                    color: product.color.withOpacity(0.05),
                                    borderRadius: BorderRadius.circular(14),
                                  ),
                                  child: Center(child: Icon(product.icon, size: 48, color: product.color)),
                                ),
                                Positioned(
                                  right: 14,
                                  top: 14,
                                  child: GestureDetector(
                                    onTap: () => setState(() => product.isFavorite = !product.isFavorite),
                                    child: Container(
                                      padding: const EdgeInsets.all(5),
                                      decoration: const BoxDecoration(color: Colors.white, shape: BoxShape.circle),
                                      child: Icon(
                                        product.isFavorite ? Icons.favorite_rounded : Icons.favorite_border_rounded,
                                        size: 16,
                                        color: product.isFavorite ? const Color(0xFFFF6584) : Colors.grey,
                                      ),
                                    ),
                                  ),
                                ),
                              ],
                            ),
                          ),
                          Padding(
                            padding: const EdgeInsets.symmetric(horizontal: 12),
                            child: Text(product.name, maxLines: 1, overflow: TextOverflow.ellipsis, style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 13)),
                          ),
                          Padding(
                            padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 2),
                            child: Row(
                              children: [
                                const Icon(Icons.star_rounded, color: Colors.amber, size: 14),
                                const SizedBox(width: 2),
                                Text('${product.rating}', style: const TextStyle(fontSize: 11, fontWeight: FontWeight.bold, color: Colors.black54)),
                              ],
                            ),
                          ),
                          Padding(
                            padding: const EdgeInsets.fromLTRB(12, 4, 12, 12),
                            child: Row(
                              mainAxisAlignment: MainAxisAlignment.between,
                              children: [
                                Text('\$${product.price}', style: const TextStyle(fontWeight: FontWeight.black, fontSize: 15, color: Color(0xFF6C63FF))),
                                GestureDetector(
                                  onTap: widget.onAddToCart,
                                  child: Container(
                                    padding: const EdgeInsets.all(6),
                                    decoration: const BoxDecoration(color: Color(0xFF6C63FF), shape: BoxShape.circle),
                                    child: const Icon(Icons.add_rounded, color: Colors.white, size: 16),
                                  ),
                                ),
                              ],
                            ),
                          ),
                        ],
                      ),
                    );
                  },
                  childCount: filtered.length,
                ),
              ),
            );
          }
        }

        // ==================== EXPLORE SCREEN ====================
        class ExploreScreen extends StatelessWidget {
          const ExploreScreen({super.key});

          @override
          Widget build(BuildContext context) {
            final List<Map<String, dynamic>> gridCategories = [
              {'name': 'Gadgets', 'count': '142 Items', 'icon': Icons.devices_other, 'color': 0xFF6C63FF},
              {'name': 'Clothing', 'count': '824 Items', 'icon': Icons.checkroom, 'color': 0xFFFF6584},
              {'name': 'Home Office', 'count': '93 Items', 'icon': Icons.desktop_mac, 'color': 0xFF43C6AC},
              {'name': 'Fitness', 'count': '115 Items', 'icon': Icons.fitness_center, 'color': 0xFFFF9A3C},
            ];

            return Scaffold(
              backgroundColor: const Color(0xFFF8F9FE),
              appBar: AppBar(
                title: const Text('Categories', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 20)),
                backgroundColor: const Color(0xFFF8F9FE),
                elevation: 0,
              ),
              body: GridView.builder(
                padding: const EdgeInsets.all(16),
                gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                  crossAxisCount: 2, crossAxisSpacing: 14, mainAxisSpacing: 14, childAspectRatio: 1.1,
                ),
                itemCount: gridCategories.length,
                itemBuilder: (context, index) {
                  final cat = gridCategories[index];
                  final baseColor = Color(cat['color'] as int);
                  return Container(
                    decoration: BoxDecoration(
                      color: Colors.white,
                      borderRadius: BorderRadius.circular(20),
                      boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.02), blurRadius: 10)],
                    ),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Container(
                          padding: const EdgeInsets.all(12),
                          decoration: BoxDecoration(color: baseColor.withOpacity(0.1), shape: BoxShape.circle),
                          child: Icon(cat['icon'] as IconData, color: baseColor, size: 28),
                        ),
                        const SizedBox(height: 10),
                        Text(cat['name'] as String, style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 15)),
                        Text(cat['count'] as String, style: TextStyle(color: Colors.grey.shade400, fontSize: 11)),
                      ],
                    ),
                  );
                },
              ),
            );
          }
        }

        // ==================== CART SCREEN ====================
        class CartScreen extends StatelessWidget {
          final int cartCount;
          const CartScreen({super.key, required this.cartCount});

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: const Color(0xFFF8F9FE),
              appBar: AppBar(
                title: const Text('My Cart', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 20)),
                backgroundColor: const Color(0xFFF8F9FE),
                elevation: 0,
              ),
              body: cartCount == 0
                  ? Center(
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Icon(Icons.shopping_basket_outlined, size: 70, color: Colors.grey.shade300),
                          const SizedBox(height: 14),
                          Text('Your cart is empty', style: TextStyle(color: Colors.grey.shade500, fontSize: 16, fontWeight: FontWeight.w500)),
                        ],
                      ),
                    )
                  : ListView(
                      padding: const EdgeInsets.all(16),
                      children: [
                        ...List.generate(cartCount > 2 ? 2 : cartCount, (index) {
                          final prod = products[index];
                          return Container(
                            margin: const EdgeInsets.only(bottom: 12),
                            padding: const EdgeInsets.all(12),
                            decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(16)),
                            child: Row(
                              children: [
                                Container(
                                  width: 60, height: 60,
                                  decoration: BoxDecoration(color: prod.color.withOpacity(0.1), borderRadius: BorderRadius.circular(12)),
                                  child: Icon(prod.icon, color: prod.color),
                                ),
                                const SizedBox(width: 14),
                                Expanded(
                                  child: Column(
                                    crossAxisAlignment: CrossAxisAlignment.start,
                                    children: [
                                      Text(prod.name, style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 14)),
                                      Text(prod.category, style: const TextStyle(color: Colors.grey, fontSize: 11)),
                                      const SizedBox(height: 4),
                                      Text('\$${prod.price}', style: const TextStyle(fontWeight: FontWeight.black, color: Color(0xFF6C63FF))),
                                    ],
                                  ),
                                ),
                              ],
                            ),
                          );
                        }),
                        const SizedBox(height: 20),
                        Container(
                          padding: const EdgeInsets.all(20),
                          decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(20)),
                          child: Column(
                            children: [
                              Row(mainAxisAlignment: MainAxisAlignment.between, children: [const Text('Total Items'), Text('$cartCount')]),
                              const Divider(height: 24),
                              Row(
                                mainAxisAlignment: MainAxisAlignment.between,
                                children: [
                                  const Text('Total Price', style: TextStyle(fontWeight: FontWeight.bold)),
                                  Text('\$${(cartCount * 129.99).toStringAsFixed(2)}', style: const TextStyle(fontWeight: FontWeight.black, fontSize: 16, color: Color(0xFF6C63FF))),
                                ],
                              ),
                            ],
                          ),
                        ),
                      ],
                    ),
            );
          }
        }

        // ==================== PROFILE SCREEN ====================
        class ProfileScreen extends StatelessWidget {
          const ProfileScreen({super.key});

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: const Color(0xFFF8F9FE),
              body: ListView(
                padding: EdgeInsets.zero,
                children: [
                  Container(
                    padding: const EdgeInsets.fromLTRB(24, 60, 24, 30),
                    decoration: const BoxDecoration(
                      gradient: LinearGradient(colors: [Color(0xFF6C63FF), Color(0xFF8C84FF)]),
                      borderRadius: BorderRadius.vertical(bottom: Radius.circular(30)),
                    ),
                    child: const Row(
                      children: [
                        CircleAvatar(radius: 32, backgroundColor: Colors.white, child: Icon(Icons.person_outline, size: 32, color: Color(0xFF6C63FF))),
                        SizedBox(width: 16),
                        Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text('Alex Morgan', style: TextStyle(color: Colors.white, fontSize: 20, fontWeight: FontWeight.bold)),
                            Text('alex.morgan@lux.com', style: TextStyle(color: Colors.white70, fontSize: 12)),
                          ],
                        ),
                      ],
                    ),
                  ),
                  Padding(
                    padding: const EdgeInsets.all(16),
                    child: Column(
                      children: [
                        _buildTile(Icons.local_shipping_outlined, 'My Orders', 'Track shipments'),
                        _buildTile(Icons.favorite_border_rounded, 'Favorites', 'Liked items'),
                        _buildTile(Icons.credit_card_rounded, 'Payments', 'Cards & Wallets'),
                        _buildTile(Icons.settings_outlined, 'Settings', 'Preferences'),
                      ],
                    ),
                  ),
                ],
              ),
            );
          }

          Widget _buildTile(IconData icon, String title, String subtitle) {
            return Container(
              margin: const EdgeInsets.only(bottom: 12),
              decoration: BoxDecoration(color: Colors.white, borderRadius: BorderRadius.circular(16)),
              child: ListTile(
                leading: Container(padding: const EdgeInsets.all(8), decoration: BoxDecoration(color: const Color(0xFF6C63FF).withOpacity(0.05), shape: BoxShape.circle), child: const Icon(Icons.person_outline, size: 20, color: Color(0xFF6C63FF))),
                title: Text(title, style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 14)),
                subtitle: Text(subtitle, style: const TextStyle(fontSize: 11)),
                trailing: const Icon(Icons.chevron_right_rounded, size: 18),
                onTap: () {},
              ),
            );
          }
        }
        DARTEOF

        # كتابة ملف تكوين التبعيات الأساسية (pubspec.yaml)
        cat > pubspec.yaml << 'PUBEOF'
        name: ecommerce_app
        description: ShopLux Premium E-Commerce Application
        version: 1.0.0+1
        publish_to: none

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter

        flutter:
          uses-material-design: true
        PUBEOF

        # معالجة ملفات أندرويد لترقية إصدار الكوتلن ومزامنة الـ Gradle
        sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle || true

        flutter clean
        flutter pub get
        flutter build apk --release
        
        # البحث الذكي عن ملف الـ APK النهائي المترجم ونسخه للمجلد العام
        find build/ -name "app-release.apk" -exec cp {} ../shoplux-premium.apk \;

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: shoplux-premium-release
        path: shoplux-premium.apk
