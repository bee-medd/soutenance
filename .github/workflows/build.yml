name: Build Premium Pinterest UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create App
      run: |
        flutter create detox_pinterest
        cd detox_pinterest

        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/rendering.dart';

        void main() => runApp(const PremiumApp());

        class PremiumApp extends StatelessWidget {
          const PremiumApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Détox Pinterest',
              debugShowCheckedModeBanner: false,
              theme: ThemeData(
                brightness: Brightness.light,
                scaffoldBackgroundColor: Colors.white,
                cardTheme: CardTheme(
                  elevation: 0,
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20)),
                  clipBehavior: Clip.antiAlias,
                ),
                appBarTheme: const AppBarTheme(
                  backgroundColor: Colors.white,
                  foregroundColor: Colors.black87,
                  elevation: 0,
                  titleTextStyle: TextStyle(fontSize: 22, fontWeight: FontWeight.bold, color: Colors.black87),
                ),
                useMaterial3: true,
              ),
              home: const HomePage(),
            );
          }
        }

        class HomePage extends StatelessWidget {
          const HomePage({super.key});

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('Détox\nPremium'),
                actions: [
                  IconButton(onPressed: () {}, icon: const Icon(Icons.search)),
                  const CircleAvatar(backgroundColor: Colors.grey, child: Icon(Icons.person, color: Colors.white)),
                ],
              ),
              body: const CustomScrollView(
                slivers: [
                  SliverToBoxAdapter(child: _Header()),
                  SliverPadding(
                    padding: EdgeInsets.all(12),
                    sliver: _WaterfallGrid(),
                  ),
                ],
              ),
            );
          }
        }

        class _Header extends StatelessWidget {
          const _Header();

          @override
          Widget build(BuildContext context) {
            return Padding(
              padding: const EdgeInsets.fromLTRB(16, 8, 16, 16),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text('Inspiration bien-être', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.grey.shade800)),
                  const SizedBox(height: 5),
                  Text('Réduisez votre temps d\'écran avec style', style: TextStyle(fontSize: 15, color: Colors.grey.shade600)),
                ],
              ),
            );
          }
        }

        class _WaterfallGrid extends StatelessWidget {
          const _WaterfallGrid();

          final int itemCount = 12;

          @override
          Widget build(BuildContext context) {
            return SliverGrid(
              gridDelegate: SliverWaterfallDelegate(crossAxisCount: 2, crossAxisSpacing: 12, mainAxisSpacing: 16),
              delegate: SliverChildBuilderDelegate(
                (context, index) => _PremiumCard(index: index),
                childCount: itemCount,
              ),
            );
          }
        }

        class SliverWaterfallDelegate extends SliverGridDelegate {
          final int crossAxisCount;
          final double crossAxisSpacing;
          final double mainAxisSpacing;

          const SliverWaterfallDelegate({
            required this.crossAxisCount,
            this.crossAxisSpacing = 0,
            this.mainAxisSpacing = 0,
          });

          @override
          SliverGridLayout getLayout(SliverConstraints constraints) {
            final double crossAxisExtent = (constraints.crossAxisExtent - (crossAxisCount - 1) * crossAxisSpacing) / crossAxisCount;
            return _WaterfallLayout(
              crossAxisCount: crossAxisCount,
              crossAxisSpacing: crossAxisSpacing,
              mainAxisSpacing: mainAxisSpacing,
              crossAxisExtent: crossAxisExtent,
            );
          }

          @override
          bool shouldRelayout(covariant SliverWaterfallDelegate oldDelegate) {
            return crossAxisCount != oldDelegate.crossAxisCount ||
                crossAxisSpacing != oldDelegate.crossAxisSpacing ||
                mainAxisSpacing != oldDelegate.mainAxisSpacing;
          }
        }

        class _WaterfallLayout extends SliverGridLayout {
          final int crossAxisCount;
          final double crossAxisSpacing;
          final double mainAxisSpacing;
          final double crossAxisExtent;

          _WaterfallLayout({
            required this.crossAxisCount,
            required this.crossAxisSpacing,
            required this.mainAxisSpacing,
            required this.crossAxisExtent,
          });

          @override
          SliverGridGeometry getGeometryForChildIndex(int index) {
            final double baseHeight = 160 + ((index % 5) * 28);
            final double mainAxisStride = baseHeight + mainAxisSpacing;
            final int row = index ~/ crossAxisCount;
            final int col = index % crossAxisCount;
            final double crossAxisStart = col * (crossAxisExtent + crossAxisSpacing);
            return SliverGridGeometry(
              scrollOffset: row * mainAxisStride,
              crossAxisOffset: crossAxisStart,
              mainAxisExtent: baseHeight,
              crossAxisExtent: crossAxisExtent,
            );
          }

          @override
          double computeMaxScrollOffset(int childCount) {
            if (childCount == 0) return 0;
            final int rows = (childCount + crossAxisCount - 1) ~/ crossAxisCount;
            double total = 0;
            for (int i = 0; i < rows; i++) {
              total += 160 + (i % 5) * 28 + mainAxisSpacing;
            }
            return total;
          }
        }

        class _PremiumCard extends StatefulWidget {
          final int index;
          const _PremiumCard({required this.index});

          @override
          State<_PremiumCard> createState() => _PremiumCardState();
        }

        class _PremiumCardState extends State<_PremiumCard> with SingleTickerProviderStateMixin {
          late AnimationController _controller;
          late Animation<double> _scale;

          @override
          void initState() {
            super.initState();
            _controller = AnimationController(vsync: this, duration: const Duration(milliseconds: 120));
            _scale = Tween<double>(begin: 1.0, end: 0.96).animate(CurvedAnimation(parent: _controller, curve: Curves.easeOutCubic));
          }

          void _onTapDown(_) => _controller.forward();
          void _onTapUp(_) => _controller.reverse();
          void _onTapCancel() => _controller.reverse();

          @override
          Widget build(BuildContext context) {
            final titles = ['Méditation 5min', 'Défi sans écran', 'Journaling', 'Marche consciente', 'Respiration', 'Lecture', 'Créativité', 'Sport', 'Cuisine', 'Sommeil', 'Apprentissage', 'Appel'];
            final subtitles = ['Calme mental', '2h offline', 'Exprimez-vous', 'Reconnexion', 'Anti-stress', 'Détox', 'Dessin/écriture', '15 min', 'Sans distraction', 'Rituel', 'Cours court', 'Véritable lien'];
            final colors = [0xFFF5E6D3, 0xFFE8F0FE, 0xFFE6F7F0, 0xFFFEF3E8, 0xFFEDE7F6, 0xFFFFF5E0, 0xFFE3F2FD, 0xFFFCE4EC, 0xFFF1F8E9, 0xFFF3E5F5, 0xFFE0F7FA, 0xFFFFF8E1];
            final int i = widget.index % titles.length;

            return GestureDetector(
              onTapDown: _onTapDown,
              onTapUp: _onTapUp,
              onTapCancel: _onTapCancel,
              onTap: () {},
              child: AnimatedBuilder(
                animation: _scale,
                builder: (context, child) => Transform.scale(
                  scale: _scale.value,
                  child: Container(
                    decoration: BoxDecoration(
                      color: Color(colors[i]),
                      borderRadius: BorderRadius.circular(24),
                      boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.04), blurRadius: 12, offset: const Offset(0, 4))],
                    ),
                    padding: const EdgeInsets.all(14),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      mainAxisAlignment: MainAxisAlignment.end,
                      children: [
                        const Spacer(),
                        Text(titles[i], style: const TextStyle(fontSize: 16, fontWeight: FontWeight.w600)),
                        const SizedBox(height: 4),
                        Text(subtitles[i], style: TextStyle(fontSize: 13, color: Colors.grey.shade700)),
                        const SizedBox(height: 12),
                        Row(
                          children: [
                            Icon(Icons.favorite_border, size: 16, color: Colors.grey.shade600),
                            const SizedBox(width: 10),
                            Icon(Icons.bookmark_border, size: 16, color: Colors.grey.shade600),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              ),
            );
          }

          @override
          void dispose() {
            _controller.dispose();
            super.dispose();
          }
        }
        DARTEOF

        cat > pubspec.yaml << 'PUBEOF'
        name: detox_pinterest
        description: App inspirée de Pinterest
        version: 1.0.0+1

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter

        flutter:
          uses-material-design: true
        PUBEOF

        flutter clean
        flutter pub get
        flutter build apk --release
        cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: detox-premium-apk
        path: app-release.apk
EOF
