name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Create simple Flutter app
      run: |
        # إنشاء تطبيق Flutter جديد
        flutter create simple_app
        cd simple_app
        
        # إنشاء main.dart بسيط
        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        
        void main() {
          runApp(const MyApp());
        }
        
        class MyApp extends StatelessWidget {
          const MyApp({super.key});
          
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Detox Pro',
              theme: ThemeData(
                primarySwatch: Colors.blue,
                useMaterial3: true,
              ),
              home: const HomePage(),
              debugShowCheckedModeBanner: false,
            );
          }
        }
        
        class HomePage extends StatelessWidget {
          const HomePage({super.key});
          
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text('Detox Pro - علاج إدمان الإنترنت'),
                backgroundColor: Colors.blue,
              ),
              body: Center(
                child: Padding(
                  padding: const EdgeInsets.all(20.0),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Icon(Icons.health_and_safety, size: 80, color: Colors.blue),
                      const SizedBox(height: 20),
                      const Text(
                        'مرحباً بك في تطبيق Detox Pro',
                        style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
                        textAlign: TextAlign.center,
                      ),
                      const SizedBox(height: 10),
                      const Text(
                        'تطبيق لعلاج إدمان الإنترنت',
                        style: TextStyle(fontSize: 16),
                        textAlign: TextAlign.center,
                      ),
                      const SizedBox(height: 30),
                      ElevatedButton(
                        onPressed: () {},
                        style: ElevatedButton.styleFrom(
                          backgroundColor: Colors.blue,
                          padding: const EdgeInsets.symmetric(horizontal: 30, vertical: 12),
                        ),
                        child: const Text(
                          'ابدأ الآن',
                          style: TextStyle(fontSize: 18, color: Colors.white),
                        ),
                      ),
                    ],
                  ),
                ),
              ),
            );
          }
        }
        DARTEOF
        
        # تحديث pubspec.yaml ليكون بسيطاً
        cat > pubspec.yaml << 'PUBEOF'
        name: simple_app
        description: Detox Pro App
        version: 1.0.0+1
        
        environment:
          sdk: '>=3.3.0 <4.0.0'
        
        dependencies:
          flutter:
            sdk: flutter
        
        flutter:
          uses-material-design: true
        PUBEOF
        
        # بناء التطبيق
        flutter clean
        flutter pub get
        flutter build apk --release
        
        # نسخ APK إلى مكان يمكن الوصول إليه
        cp build/app/outputs/flutter-apk/app-release.apk ../detox-pro.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: detox-pro-app
        path: detox-pro.apk
