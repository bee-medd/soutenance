name: Toga DZ - Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create Flutter project skeleton
        run: |
          flutter create --project-name toga_dz --org dz.toga .
          rm -f lib/main.dart

      - name: Restore our code
        run: |
          git checkout HEAD -- lib/ pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: toga-dz-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
