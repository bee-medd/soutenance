name: Build Art Space Premium App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # إعداد جافا 17 الضرورية لبناء تطبيقات أندرويد الحديثة
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # تفعيل الكاش لتسريع الـ Build
    - name: Cache Flutter & Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-artspace-build-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-artspace-build-

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Create Art Space App
      run: |
        flutter create art_space_app
        cd art_space_app

        # كتابة كود الواجهة المستوحاة من تصميم الصورة بدقة
        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/services.dart';

        void main() {
          WidgetsFlutterBinding.ensureInitialized();
          SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
          SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
            statusBarColor: Colors.transparent,
            statusBarIconBrightness: Brightness.dark,
          ));
          runApp(const ArtSpaceApp());
        }

        class ArtSpaceApp extends StatelessWidget {
          const ArtSpaceApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Art Space',
              theme: ThemeData(
                brightness: Brightness.light,
                scaffoldBackgroundColor: const Color(0xFFF6F5F2), // لون خلفية الصورة تماماً
                useMaterial3: true,
              ),
              debugShowCheckedModeBanner: false,
              home: const ArtSpaceHome(),
            );
          }
        }

        class ArtSpaceHome extends StatelessWidget {
          const ArtSpaceHome({super.key});

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: SafeArea(
                child: Padding(
                  padding: const EdgeInsets.symmetric(horizontal: 24.0),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.center,
                    children: [
                      const SizedBox(height: 40),
                      // العنوان العلوي الرئيسي المماثل للصورة
                      const Text(
                        'ART\nSPACE',
                        textAlign: TextAlign.center,
                        style: TextStyle(
                          fontSize: 48,
                          fontWeight: FontWeight.w300,
                          letterSpacing: 4,
                          height: 1.1,
                          color: Color(0xFF8E8E93),
                          fontFamily: 'serif',
                        ),
                      ),
                      const SizedBox(height: 8),
                      // النص الفرعي الصغير
                      const Text(
                        'CHAPTER 4',
                        style: TextStyle(
                          fontSize: 11,
                          fontWeight: FontWeight.w500,
                          letterSpacing: 2,
                          color: Colors.black50,
                        ),
                      ),
                      const SizedBox(height: 12),
                      // نص التحديثات القادمة
                      const Text(
                        'UPCOMING\nRELEASES',
                        textAlign: TextAlign.center,
                        style: TextStyle(
                          fontSize: 26,
                          fontWeight: FontWeight.w700,
                          letterSpacing: 1,
                          height: 1.1,
                          color: Colors.black87,
                          fontFamily: 'serif',
                        ),
                      ),
                      const Spacer(),
                      
                      // كومة الكتب المصممة بالـ Widgets لمحاكاة الصورة بدقة
                      _buildBooksStack(),
                      
                      const SizedBox(height: 20),
                    ],
                  ),
                ),
              ),
            );
          }

          // ويدجت لبناء كومة الكتب المتدرجة في الأحجام والألوان
          Widget _buildBooksStack() {
            return Column(
              mainAxisAlignment: MainAxisAlignment.end,
              children: [
                // الكتاب الأول (الأحمر في الأعلى)
                _buildSingleBook(
                  width: 140,
                  height: 24,
                  gradientColors: [const Color(0xFF9E1A1A), const Color(0xFFBD2424)],
                  shadowColor: Colors.black25,
                ),
                // الكتاب الثاني (الرمادي)
                _buildSingleBook(
                  width: 170,
                  height: 32,
                  gradientColors: [const Color(0xFFB0B0B5), const Color(0xFFD1D1D6)],
                  shadowColor: Colors.black12,
                  child: const Center(
                    child: Text(
                      'CRITIC',
                      style: TextStyle(
                        color: Color(0xFF8E8E93),
                        fontSize: 14,
                        fontWeight: FontWeight.w800,
                        letterSpacing: 3,
                      ),
                    ),
                  ),
                ),
                // الكتاب الثالث (الأزرق الداكن)
                _buildSingleBook(
                  width: 190,
                  height: 38,
                  gradientColors: [const Color(0xFF1C1C3A), const Color(0xFF2A2A54)],
                  shadowColor: Colors.black38,
                  child: const Center(
                    child: Text(
                      'DAVID CROW',
                      style: TextStyle(
                        color: Color(0xFF8A8AAB),
                        fontSize: 10,
                        fontWeight: FontWeight.w500,
                        letterSpacing: 1.5,
                      ),
                    ),
                  ),
                ),
                // الكتاب الرابع (الوردي المتميز)
                _buildSingleBook(
                  width: 200,
                  height: 65,
                  gradientColors: [const Color(0xFFE289B3), const Color(0xFFF3A7CC)],
                  shadowColor: Colors.black25,
                  child: const Center(
                    child: Text(
                      'HEY',
                      style: TextStyle(
                        color: Colors.white,
                        fontSize: 18,
                        fontWeight: FontWeight.bold,
                        letterSpacing: 2,
                      ),
                    ),
                  ),
                ),
                // الكتاب الخامس والأكبر (الأزرق الأساسي في الأسفل)
                _buildSingleBook(
                  width: 215,
                  height: 95,
                  gradientColors: [const Color(0xFF223A70), const Color(0xFF335298)],
                  shadowColor: Colors.black45,
                  borderRadius: const BorderRadius.vertical(top: Radius.circular(8)),
                  child: const Padding(
                    padding: EdgeInsets.symmetric(horizontal: 12.0, vertical: 8.0),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Text(
                          'DESIGN',
                          style: TextStyle(
                            color: Color(0xFF14244A),
                            fontSize: 22,
                            fontWeight: FontWeight.w900,
                            letterSpacing: 2,
                          ),
                        ),
                        Text(
                          'BY ACCIDENT:\nFOR A NEW',
                          textAlign: TextAlign.center,
                          style: TextStyle(
                            color: Color(0xFF14244A),
                            fontSize: 12,
                            fontWeight: FontWeight.w700,
                            height: 1.1,
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              ],
            );
          }

          // دالة مساعدة لتشكيل كل كتاب مع تأثيرات الظلال والأبعاد
          Widget _buildSingleBook({
            required double width,
            required double height,
            required List<Color> gradientColors,
            required Color shadowColor,
            BorderRadiusGeometry? borderRadius,
            Widget? child,
          }) {
            return Container(
              width: width,
              height: height,
              decoration: BoxDecoration(
                gradient: LinearGradient(
                  begin: Alignment.topCenter,
                  end: Alignment.bottomCenter,
                  colors: gradientColors,
                ),
                borderRadius: borderRadius ?? BorderRadius.circular(4),
                boxShadow: [
                  BoxShadow(
                    color: shadowColor,
                    blurRadius: 6,
                    offset: const Offset(0, 3),
                  ),
                  // خط إضاءة علوي خفيف ليعطي تأثير الكتاب الواقعي 3D
                  BoxShadow(
                    color: Colors.white.withOpacity(0.15),
                    blurRadius: 0,
                    offset: const Offset(0, -1),
                  ),
                ],
              ),
              child: child,
            );
          }
        }
        DARTEOF

        # كتابة ملف pubspec.yaml المتناسق
        cat > pubspec.yaml << 'PUBEOF'
        name: art_space_app
        description: Art Space Premium Elegant App
        version: 1.0.0+1
        publish_to: none

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter

        flutter:
          uses-material-design: true
        PUBEOF

        # إصلاح وتحديث نسخة الـ Kotlin لمنع مشاكل الـ Gradle الشهيرة
        sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle || true

        flutter clean
        flutter pub get
        flutter build apk --release
        
        # نسخ الـ APK النهائي إلى المجلد الرئيسي للبناء السحابي
        find build/ -name "app-release.apk" -exec cp {} ../art-space-premium.apk \;

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: art-space-release
        path: art-space-premium.apk
