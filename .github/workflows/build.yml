name: 3D Dress Designer Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Build 3D Dress App
      run: |
        flutter create dress_3d
        cd dress_3d

        # Ajouter la dépendance model_viewer_plus
        cat >> pubspec.yaml << 'PUBEOF'
        
        dependencies:
          flutter:
            sdk: flutter
          model_viewer_plus: ^1.7.0
        
        flutter:
          uses-material-design: true
        PUBEOF

        cat > lib/main.dart << 'DARTEOF'
        import 'package:flutter/material.dart';
        import 'package:flutter/services.dart';
        import 'package:model_viewer_plus/model_viewer_plus.dart';

        void main() {
          WidgetsFlutterBinding.ensureInitialized();
          SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
          runApp(const DressDesignerApp());
        }

        class DressDesignerApp extends StatelessWidget {
          const DressDesignerApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: '3D Dress Designer',
              debugShowCheckedModeBanner: false,
              theme: ThemeData(
                useMaterial3: true,
                primaryColor: const Color(0xFFC62828),
                scaffoldBackgroundColor: const Color(0xFF1A1A2E),
              ),
              home: const DressDesigner(),
            );
          }
        }

        class DressModel3D {
          final String name;
          final String modelUrl;
          final String imageUrl;
          DressModel3D({required this.name, required this.modelUrl, required this.imageUrl});
        }

        // Modèles 3D - Utilise des modèles gratuits de robe
        final List<DressModel3D> dressModels = [
          DressModel3D(
            name: 'Robe Princesse',
            modelUrl: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            imageUrl: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=200',
          ),
          DressModel3D(
            name: 'Robe Sirène',
            modelUrl: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            imageUrl: 'https://images.unsplash.com/photo-1597911634397-6e08f6a0f915?w=200',
          ),
          DressModel3D(
            name: 'Robe Bohème',
            modelUrl: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            imageUrl: 'https://images.unsplash.com/photo-1556825506-70143e151b1c?w=200',
          ),
        ];

        class DressDesigner extends StatefulWidget {
          const DressDesigner({super.key});

          @override
          State<DressDesigner> createState() => _DressDesignerState();
        }

        class _DressDesignerState extends State<DressDesigner> {
          int _selectedModelIndex = 0;
          Color _selectedColor = const Color(0xFFC62828);
          String _selectedFabric = 'Satin';
          
          final List<Color> _colors = [
            const Color(0xFFC62828), // Rouge
            const Color(0xFF1565C0), // Bleu
            const Color(0xFF2E7D32), // Vert
            const Color(0xFF6A1B9A), // Violet
            const Color(0xFFFF8F00), // Or
            const Color(0xFFF5F5F5), // Blanc
            const Color(0xFF212121), // Noir
            const Color(0xFFF48FB1), // Rose
          ];
          
          final List<String> _fabrics = ['Satin', 'Soie', 'Dentelle', 'Tulle', 'Velours', 'Crêpe'];

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Stack(
                children: [
                  // Fond dégradé
                  Container(
                    decoration: const BoxDecoration(
                      gradient: LinearGradient(
                        begin: Alignment.topLeft,
                        end: Alignment.bottomRight,
                        colors: [Color(0xFF1A1A2E), Color(0xFF16213E)],
                      ),
                    ),
                  ),
                  
                  SafeArea(
                    child: Column(
                      children: [
                        // AppBar personnalisée
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 12),
                          child: Row(
                            children: [
                              const CircleAvatar(
                                backgroundColor: Color(0xFFC62828),
                                child: Icon(Icons.style, color: Colors.white),
                              ),
                              const SizedBox(width: 12),
                              const Text(
                                '3D Dress Designer',
                                style: TextStyle(
                                  fontSize: 20,
                                  fontWeight: FontWeight.bold,
                                  color: Colors.white,
                                ),
                              ),
                              const Spacer(),
                              IconButton(
                                icon: const Icon(Icons.shopping_cart_outlined, color: Colors.white),
                                onPressed: () {},
                              ),
                              IconButton(
                                icon: const Icon(Icons.favorite_border, color: Colors.white),
                                onPressed: () {},
                              ),
                            ],
                          ),
                        ),
                        
                        // Zone 3D - Le cœur de l'application
                        Container(
                          height: 350,
                          margin: const EdgeInsets.all(16),
                          decoration: BoxDecoration(
                            color: Colors.black26,
                            borderRadius: BorderRadius.circular(24),
                            border: Border.all(color: Colors.white24, width: 1),
                          ),
                          child: ClipRRect(
                            borderRadius: BorderRadius.circular(24),
                            child: ModelViewer(
                              src: dressModels[_selectedModelIndex].modelUrl,
                              alt: dressModels[_selectedModelIndex].name,
                              ar: false,
                              autoRotate: true,
                              autoRotateDelay: 2000,
                              disableZoom: false,
                              cameraControls: true,
                              iosSrc: dressModels[_selectedModelIndex].modelUrl,
                              backgroundColor: Colors.transparent,
                              onLoaded: (_) => print('Modèle 3D chargé'),
                            ),
                          ),
                        ),
                        
                        // Sélecteur de modèle
                        SizedBox(
                          height: 80,
                          child: ListView.builder(
                            scrollDirection: Axis.horizontal,
                            padding: const EdgeInsets.symmetric(horizontal: 16),
                            itemCount: dressModels.length,
                            itemBuilder: (context, index) {
                              return GestureDetector(
                                onTap: () => setState(() => _selectedModelIndex = index),
                                child: Container(
                                  width: 70,
                                  margin: const EdgeInsets.only(right: 12),
                                  decoration: BoxDecoration(
                                    borderRadius: BorderRadius.circular(12),
                                    border: Border.all(
                                      color: _selectedModelIndex == index 
                                        ? const Color(0xFFC62828) 
                                        : Colors.transparent,
                                      width: 2,
                                    ),
                                  ),
                                  child: Column(
                                    children: [
                                      Expanded(
                                        child: ClipRRect(
                                          borderRadius: BorderRadius.circular(10),
                                          child: Image.network(
                                            dressModels[index].imageUrl,
                                            fit: BoxFit.cover,
                                            errorBuilder: (_, __, ___) => const Icon(Icons.dress, color: Colors.white),
                                          ),
                                        ),
                                      ),
                                      const SizedBox(height: 4),
                                      Text(
                                        dressModels[index].name,
                                        style: const TextStyle(
                                          fontSize: 10,
                                          color: Colors.white70,
                                        ),
                                      ),
                                    ],
                                  ),
                                ),
                              );
                            },
                          ),
                        ),
                        
                        const SizedBox(height: 16),
                        
                        // Panneau de personnalisation
                        Expanded(
                          child: Container(
                            decoration: const BoxDecoration(
                              color: Colors.white,
                              borderRadius: BorderRadius.vertical(top: Radius.circular(30)),
                            ),
                            child: SingleChildScrollView(
                              padding: const EdgeInsets.all(20),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  const Text(
                                    'Personnalisez votre robe',
                                    style: TextStyle(
                                      fontSize: 18,
                                      fontWeight: FontWeight.bold,
                                      color: Color(0xFF1A1A2E),
                                    ),
                                  ),
                                  const SizedBox(height: 20),
                                  
                                  // Sélecteur de couleurs
                                  const Text(
                                    'Couleur',
                                    style: TextStyle(fontSize: 14, fontWeight: FontWeight.w600),
                                  ),
                                  const SizedBox(height: 8),
                                  SizedBox(
                                    height: 50,
                                    child: ListView.builder(
                                      scrollDirection: Axis.horizontal,
                                      itemCount: _colors.length,
                                      itemBuilder: (context, index) {
                                        final color = _colors[index];
                                        final isSelected = _selectedColor == color;
                                        return GestureDetector(
                                          onTap: () => setState(() => _selectedColor = color),
                                          child: Container(
                                            width: 44,
                                            margin: const EdgeInsets.only(right: 12),
                                            decoration: BoxDecoration(
                                              color: color,
                                              shape: BoxShape.circle,
                                              border: Border.all(
                                                color: isSelected ? const Color(0xFFC62828) : Colors.grey.shade300,
                                                width: isSelected ? 3 : 1,
                                              ),
                                              boxShadow: isSelected ? [
                                                BoxShadow(
                                                  color: const Color(0xFFC62828).withOpacity(0.4),
                                                  blurRadius: 8,
                                                ),
                                              ] : null,
                                            ),
                                            child: isSelected 
                                              ? const Icon(Icons.check, color: Colors.white, size: 20)
                                              : null,
                                          ),
                                        );
                                      },
                                    ),
                                  ),
                                  
                                  const SizedBox(height: 20),
                                  
                                  // Sélecteur de tissu
                                  const Text(
                                    'Tissu',
                                    style: TextStyle(fontSize: 14, fontWeight: FontWeight.w600),
                                  ),
                                  const SizedBox(height: 8),
                                  Wrap(
                                    spacing: 8,
                                    children: _fabrics.map((fabric) {
                                      final isSelected = _selectedFabric == fabric;
                                      return FilterChip(
                                        label: Text(fabric),
                                        selected: isSelected,
                                        onSelected: (_) => setState(() => _selectedFabric = fabric),
                                        backgroundColor: Colors.grey.shade100,
                                        selectedColor: const Color(0xFFC62828).withOpacity(0.1),
                                        checkmarkColor: const Color(0xFFC62828),
                                        labelStyle: TextStyle(
                                          color: isSelected ? const Color(0xFFC62828) : Colors.grey.shade700,
                                          fontWeight: isSelected ? FontWeight.w600 : null,
                                        ),
                                      );
                                    }).toList(),
                                  ),
                                  
                                  const SizedBox(height: 24),
                                  
                                  // Aperçu des modifications
                                  Container(
                                    padding: const EdgeInsets.all(16),
                                    decoration: BoxDecoration(
                                      color: const Color(0xFFFDF5F0),
                                      borderRadius: BorderRadius.circular(16),
                                    ),
                                    child: Row(
                                      children: [
                                        Container(
                                          width: 60,
                                          height: 60,
                                          decoration: BoxDecoration(
                                            color: _selectedColor,
                                            borderRadius: BorderRadius.circular(12),
                                          ),
                                          child: Center(
                                            child: Text(
                                              _selectedFabric.substring(0, 1),
                                              style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold),
                                            ),
                                          ),
                                        ),
                                        const SizedBox(width: 16),
                                        Expanded(
                                          child: Column(
                                            crossAxisAlignment: CrossAxisAlignment.start,
                                            children: [
                                              Text(
                                                dressModels[_selectedModelIndex].name,
                                                style: const TextStyle(
                                                  fontSize: 16,
                                                  fontWeight: FontWeight.bold,
                                                ),
                                              ),
                                              const SizedBox(height: 4),
                                              Text(
                                                'Couleur: ${_getColorName(_selectedColor)} · Tissu: $_selectedFabric',
                                                style: TextStyle(fontSize: 12, color: Colors.grey.shade600),
                                              ),
                                              const SizedBox(height: 4),
                                              Text(
                                                'Prix: ${_getPrice(_selectedModelIndex)} €',
                                                style: const TextStyle(
                                                  fontSize: 14,
                                                  fontWeight: FontWeight.bold,
                                                  color: Color(0xFFC62828),
                                                ),
                                              ),
                                            ],
                                          ),
                                        ),
                                      ],
                                    ),
                                  ),
                                  
                                  const SizedBox(height: 24),
                                  
                                  // Boutons d'action
                                  Row(
                                    children: [
                                      Expanded(
                                        child: OutlinedButton.icon(
                                          onPressed: () {},
                                          icon: const Icon(Icons.favorite_border),
                                          label: const Text('SAUVEGARDER'),
                                          style: OutlinedButton.styleFrom(
                                            foregroundColor: const Color(0xFFC62828),
                                            side: const BorderSide(color: Color(0xFFC62828)),
                                            padding: const EdgeInsets.symmetric(vertical: 14),
                                            shape: RoundedRectangleBorder(
                                              borderRadius: BorderRadius.circular(12),
                                            ),
                                          ),
                                        ),
                                      ),
                                      const SizedBox(width: 12),
                                      Expanded(
                                        child: ElevatedButton.icon(
                                          onPressed: () {
                                            _showOrderDialog(context);
                                          },
                                          icon: const Icon(Icons.shopping_cart),
                                          label: const Text('COMMANDER'),
                                          style: ElevatedButton.styleFrom(
                                            backgroundColor: const Color(0xFFC62828),
                                            foregroundColor: Colors.white,
                                            padding: const EdgeInsets.symmetric(vertical: 14),
                                            shape: RoundedRectangleBorder(
                                              borderRadius: BorderRadius.circular(12),
                                            ),
                                          ),
                                        ),
                                      ),
                                    ],
                                  ),
                                  
                                  const SizedBox(height: 16),
                                  
                                  // Information livraison
                                  Container(
                                    padding: const EdgeInsets.all(12),
                                    decoration: BoxDecoration(
                                      color: Colors.blue.shade50,
                                      borderRadius: BorderRadius.circular(12),
                                    ),
                                    child: const Row(
                                      children: [
                                        Icon(Icons.local_shipping, color: Colors.blue, size: 20),
                                        SizedBox(width: 8),
                                        Expanded(
                                          child: Text(
                                            'Livraison gratuite · Délai 4 semaines · Sur-mesure',
                                            style: TextStyle(fontSize: 11),
                                          ),
                                        ),
                                      ],
                                    ),
                                  ),
                                ],
                              ),
                            ),
                          ),
                        ),
                      ],
                    ),
                  ),
                ],
              ),
            );
          }
          
          String _getColorName(Color color) {
            if (color == const Color(0xFFC62828)) return 'Rouge';
            if (color == const Color(0xFF1565C0)) return 'Bleu';
            if (color == const Color(0xFF2E7D32)) return 'Vert';
            if (color == const Color(0xFF6A1B9A)) return 'Violet';
            if (color == const Color(0xFFFF8F00)) return 'Or';
            if (color == const Color(0xFFF5F5F5)) return 'Blanc';
            if (color == const Color(0xFF212121)) return 'Noir';
            if (color == const Color(0xFFF48FB1)) return 'Rose';
            return 'Personnalisé';
          }
          
          int _getPrice(int index) {
            return [450, 520, 380][index];
          }
          
          void _showOrderDialog(BuildContext context) {
            showDialog(
              context: context,
              builder: (context) => AlertDialog(
                shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20)),
                title: const Text('Commande personnalisée'),
                content: Column(
                  mainAxisSize: MainAxisSize.min,
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text('Robe: ${dressModels[_selectedModelIndex].name}'),
                    const SizedBox(height: 8),
                    Text('Couleur: ${_getColorName(_selectedColor)}'),
                    const SizedBox(height: 8),
                    Text('Tissu: $_selectedFabric'),
                    const SizedBox(height: 8),
                    Text('Prix: ${_getPrice(_selectedModelIndex)} €', style: const TextStyle(fontWeight: FontWeight.bold)),
                    const SizedBox(height: 16),
                    const Text('Notre styliste vous contactera sous 24h', style: TextStyle(fontSize: 12)),
                  ],
                ),
                actions: [
                  TextButton(
                    onPressed: () => Navigator.pop(context),
                    child: const Text('Annuler'),
                  ),
                  ElevatedButton(
                    onPressed: () {
                      Navigator.pop(context);
                      ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('Demande envoyée! Vous serez contacté.')),
                      );
                    },
                    style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFFC62828)),
                    child: const Text('Confirmer'),
                  ),
                ],
              ),
            );
          }
        }
        DARTEOF

        flutter clean
        flutter pub get
        flutter build apk --release
        cp build/app/outputs/flutter-apk/app-release.apk ../dress-3d.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dress-3d-designer
        path: dress-3d.apk
