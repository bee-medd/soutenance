<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>body{margin:0;overflow:hidden;background:#f7f6fb}canvas{display:block}</style>
</head>
<body>
<script src="js/three.min.js"></script>
<script src="js/GLTFLoader.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf7f6fb);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,1,3);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
const light=new THREE.HemisphereLight(0xffffff,0x444444,1.5);
scene.add(light);
const loader=new THREE.GLTFLoader();
loader.load('../models/robe.glb',gltf=>{
  const model=gltf.scene;
  model.scale.set(1.5,1.5);
  scene.add(model);
  animate();
},undefined,err=>{console.error(err)});
function animate(){requestAnimationFrame(animate);scene.rotation.y+=0.005;renderer.render(scene,camera);}
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
